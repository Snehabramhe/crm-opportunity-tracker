# Full local stack: MongoDB + backend API + frontend (nginx).
# Usage: docker compose up --build
# Then open http://localhost:8080
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 8000
      MONGO_URI: mongodb://mongo:27017/crm
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 2h
      COOKIE_MAX_AGE: 7200000
      # Frontend is same-origin via the nginx proxy, but include localhost for safety.
      CLIENT_ORIGIN: http://localhost:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
